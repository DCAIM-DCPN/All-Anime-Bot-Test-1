name: Anime Automation Bot (Two-Step)

on:
  workflow_dispatch:
    inputs:
      anime_name:
        description: 'Anime Name'
        required: true

jobs:
  collect_torrents:
    runs-on: ubuntu-latest
    outputs:
      raw_torrents_json_path: ${{ steps.save_raw_torrents.outputs.path }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install requests

      - name: Run Anime Collector
        env:
          RPMSHARE_API_KEY: ${{ secrets.RPMSHARE_API_KEY }}
          MANUS_API_KEY: ${{ secrets.MANUS_API_KEY }}
        run: |
          python main.py --anime "${{ github.event.inputs.anime_name }}"

      - name: Upload Raw Torrents as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: raw-torrents-data
          path: bot_data/raw_torrents.json

      - name: Save Raw Torrents Path for Manus
        id: save_raw_torrents
        run: |
          echo "path=bot_data/raw_torrents.json" >> "$GITHUB_OUTPUT"

  # This job is a placeholder. In a real scenario, Manus would be invoked here
  # to process the raw_torrents.json and generate the executor.py script.
  # For now, the user will manually take the raw_torrents.json and ask Manus.
  # The next step would be a separate workflow dispatch for running the executor.

